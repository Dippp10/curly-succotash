name: Auto PR & Merge

# Triggers: scheduled + manual
on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:        # Allows manual trigger

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Configure Git identity (required for commits)
      - name: Configure Git user
        run: |
          git config --global user.email "deepikakarthik697@gmail.com"
          git config --global user.name "Dippp10"

      # Step 3: Create a new branch and commit a small change
      - name: Create branch and commit
        run: |
          BRANCH_NAME="auto-branch-$(date +%s)"
          git checkout -b $BRANCH_NAME
          echo "Auto update $(date)" >> auto-update.txt
          git add auto-update.txt
          git commit -m "Auto commit for PR"
          git push origin $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      # Step 4: Create Pull Request
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Auto PR $(date +%s)"
          body: "Automatically generated PR"
          head: ${{ env.BRANCH_NAME }}
          base: main
          draft: false

      # Step 5: Merge Pull Request automatically
      - name: Merge Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: "open"
            });

            for (const pr of pulls.data) {
              if (pr.head.ref === process.env.BRANCH_NAME) {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: "squash"
                });
                console.log(`Merged PR #${pr.number}`);
              }
            }
