name: Auto PR & Merge

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:      # Allows manual triggers

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create a new branch
        run: |
          BRANCH_NAME="auto-branch-$(date +%s)"
          git checkout -b $BRANCH_NAME
          echo "Some update" >> auto-update.txt
          git add auto-update.txt
          git commit -m "Auto commit for PR"
          git push origin $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Auto PR $(date +%s)"
          body: "Automatically generated PR"
          head: ${{ env.BRANCH_NAME }}
          base: main
          draft: false

      - name: Merge Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: "open"
            });

            for (const pr of pulls.data) {
              if (pr.head.ref === process.env.BRANCH_NAME) {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: "squash"
                });
                console.log(`Merged PR #${pr.number}`);
              }
            }
