name: Auto PR & Merge (Clean Version)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:      # Allows manual triggers

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configure Git identity
      - name: Configure Git user
        run: |
          git config --global user.email "deepikakarthik697@gmail.com"
          git config --global user.name "Dippp10"

      # 3️⃣ Create new branch + commit
      - name: Create branch and commit
        id: commit_step
        run: |
          BRANCH_NAME="auto-branch-$(date +%s)"
          git checkout -b $BRANCH_NAME
          echo "Auto update $(date)" >> auto-update.txt
          git add auto-update.txt
          git commit -m "Auto commit for PR"
          git push origin $BRANCH_NAME
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      # 4️⃣ Create Pull Request
      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Auto PR ${{ github.run_number }}"
          body: "Automatically generated PR"
          head: ${{ steps.commit_step.outputs.branch_name }}
          base: main
          draft: false

      # 5️⃣ Wait for PR to register (optional safety delay)
      - name: Wait 20 seconds
        if: steps.create_pr.outputs.pull-request-number != ''
        run: sleep 20

      # 6️⃣ Enable Auto-Merge (merges when checks pass)
      - name: Enable Auto Merge
        if: steps.create_pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.create_pr.outputs.pull-request-number }};

            await github.graphql(`
              mutation {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: "${{ steps.create_pr.outputs.pull-request-id }}"
                  mergeMethod: SQUASH
                }) {
                  clientMutationId
                }
              }
            `);

            console.log(`Auto-merge enabled for PR #${prNumber}`);
