name: Auto Create Pull Request

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config --global user.email "deepikakarthik697@gmail.com"
          git config --global user.name "Dippp10"

      - name: Create branch and commit
        run: |
          # Create branch
          BRANCH_NAME="auto-branch-$(date +%s)"
          git checkout -b $BRANCH_NAME
          
          # Make a small change
          echo "Auto update $(date)" >> auto-update.txt
          git add auto-update.txt
          git commit -m "Auto commit for PR"

          # Push using PAT
          git push https://$GITHUB_ACTOR:${{ secrets.GH_TOKEN }}@github.com/Dippp10/curly-succotash.git $BRANCH_NAME

          # Save branch name for PR creation
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Wait 10 seconds
        run: sleep 10  # Give GitHub API time to register branch

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          title: "Auto PR $(date +%s)"
          body: "Automatically generated PR"
          branch: ${{ env.BRANCH_NAME }}  # source branch
          base: main                      # target branch
          draft: false 
